openapi: 3.1.0
info:
  title: API Gestión de Solicitudes Académicas
  version: 1.0.0
  description: API REST para gestionar solicitudes académicas, usuarios, historial y funcionalidades de IA.

servers:
  - url: http://localhost:8080/

paths:
  /url:
    get:
      description: New endpoint
      responses:
        200:
          description: New response
          content:
            application/json:
              schema:
                type: string

# ==================== USUARIOS ====================

  /usuarios/crear:
    post:
      summary: Crear usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearUsuarioRequestDTO'
      responses:
        '201':
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponseDTO'

  /usuarios/login:
    post:
      summary: Autenticación de usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestDTO'
      responses:
        '200':
          description: Token generado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponseDTO'
        '401':
          description: Credenciales inválidas

  /usuarios/{id}:
    get:
      summary: Obtener usuario por ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponseDTO'

  /usuarios/rol/{rol}:
    get:
      summary: Obtener usuarios por rol
      parameters:
        - in: path
          name: rol
          required: true
          schema:
            $ref: '#/components/schemas/Rol'
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UsuarioResponseDTO'

  /usuarios/correo/{correo}:
    get:
      summary: Obtener usuario por correo
      parameters:
        - in: path
          name: correo
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponseDTO'

  /usuarios/{id}/activo:
    get:
      summary: Validar si usuario está activo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
           description: Usuario activo
        '409':
           description: Usuario inactivo


  # ==================== SOLICITUDES ====================

  /solicitudes/registrar/{idSolicitante}:
    post:
      summary: Registrar solicitud
      parameters:
        - in: path
          name: idSolicitante
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearSolicitudRequestDTO'
      responses:
        '201':
          description: Solicitud registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponseDTO'

  /solicitudes/priorizar/{idSolicitud}:
    put:
      summary: Asignar prioridad a solicitud
      parameters:
        - in: path
          name: idSolicitud
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrioridadSolicitudRequestDTO'
      responses:
        '200':
          description: Solicitud priorizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponseDTO'

  /solicitudes/{idSolicitud}/asignar/{idResponsable}:
    post:
      summary: Asignar responsable a solicitud
      parameters:
        - in: path
          name: idSolicitud
          required: true
          schema:
            type: integer
            format: int64
        - in: path
          name: idResponsable
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Responsable asignado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponseDTO'

  /solicitudes/estado/{estado}:
    get:
      summary: Consultar solicitudes por estado
      parameters:
        - in: path
          name: estado
          required: true
          schema:
            $ref: '#/components/schemas/EstadoSolicitud'
      responses:
        '200':
          description: Lista de solicitudes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SolicitudResponseDTO'

  /solicitudes/tipo/{tipo}:
    get:
      summary: Consultar solicitudes por tipo
      parameters:
        - in: path
          name: tipo
          required: true
          schema:
            $ref: '#/components/schemas/TipoSolicitud'
      responses:
        '200':
          description: Lista de solicitudes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SolicitudResponseDTO'

  /solicitudes/prioridad/{prioridad}:
    get:
      summary: Consultar solicitudes por prioridad
      parameters:
        - in: path
          name: prioridad
          required: true
          schema:
            $ref: '#/components/schemas/NivelPrioridad'
      responses:
        '200':
          description: Lista de solicitudes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SolicitudResponseDTO'

  /solicitudes/responsable/{idResponsable}:
    get:
      summary: Consultar solicitudes por responsable
      parameters:
        - in: path
          name: idResponsable
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Lista de solicitudes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SolicitudResponseDTO'

  /solicitudes/rango:
    get:
      summary: Consultar solicitudes por rango de fechas
      parameters:
        - in: query
          name: desde
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: hasta
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Lista de solicitudes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SolicitudResponseDTO'

  /solicitudes/estado-tipo:
    get:
      summary: Consultar solicitudes por estado y tipo
      parameters:
        - in: query
          name: estado
          required: true
          schema:
            $ref: '#/components/schemas/EstadoSolicitud'
        - in: query
          name: tipo
          required: true
          schema:
            $ref: '#/components/schemas/TipoSolicitud'
      responses:
        '200':
          description: Lista de solicitudes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SolicitudResponseDTO'

  /solicitudes/solicitante/{idSolicitante}:
    get:
      summary: Consultar solicitudes por solicitante
      parameters:
        - in: path
          name: idSolicitante
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Lista de solicitudes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SolicitudResponseDTO'

  /solicitudes/cerrar/{idSolicitud}:
    post:
      summary: Cerrar solicitud
      parameters:
        - in: path
          name: idSolicitud
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
      responses:
        '200':
          description: Solicitud cerrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SolicitudResponseDTO'

  /solicitudes/{idSolicitud}/resumen:
    get:
      summary: Generar resumen de solicitud
      parameters:
        - in: path
          name: idSolicitud
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Resumen generado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResumenSolicitudResponseDTO'

  # ==================== HISTORIAL SOLICITUDES ====================

  /historial-solicitudes/registrar-accion:
    post:
      summary: Registrar acción en el historial de una solicitud
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HistorialSolicitudesRequestDTO'
      responses:
        '201':
          description: Acción registrada en el historial
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistorialSolicitudesResponseDTO'

    /historial-solicitudes/solicitud/{idSolicitud}:
      get:
        summary: Obtener historial de una solicitud
        parameters:
          - in: path
            name: idSolicitud
            required: true
            schema:
              type: integer
              format: int64
        responses:
          '200':
            description: Lista de acciones del historial de la solicitud
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/HistorialSolicitudesResponseDTO'

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    LoginRequestDTO:
      type: object
      properties:
        correoElectronico:
          type: string
        password:
          type: string

    LoginResponseDTO:
      type: object
      properties:
        token:
          type: string

    UsuarioResponseDTO:
      type: object
      properties:
        idUsuario:
          type: string
        nombre:
          type: string
        correo:
          type: string
        rol:
          $ref: '#/components/schemas/Rol'
        activo:
          type: boolean

    CrearUsuarioRequestDTO:
      type: object
      properties:
        nombre:
          type: string
        correo:
          type: string
        password:
          type: string
        rol:
          $ref: '#/components/schemas/Rol'

    Rol:
      type: string
      enum:
        - Estudiante
        - Docente
        - Administrativo

    CrearSolicitudRequestDTO:
      type: object
      properties:
        descripcion:
          type: string
        tipoSolicitud:
          $ref: '#/components/schemas/TipoSolicitud'
        canalOrigen:
          type: string


    SolicitudResponseDTO:
      type: object
      properties:
        idSolicitud:
          type: integer
          format: int64
          description: Identificador de la solicitud

        descripcion:
          type: string
          description: Descripción de la solicitud académica

        fechaHoraRegistro:
          type: string
          format: date-time
          description: Fecha y hora en que se registró la solicitud

        canalOrigen:
          $ref: '#/components/schemas/CanalOrigen'

        tipoSolicitud:
          $ref: '#/components/schemas/TipoSolicitud'

        estadoSolicitud:
          $ref: '#/components/schemas/EstadoSolicitud'

        fechaLimite:
          type: string
          format: date-time
          description: Fecha límite para atender la solicitud

        nivelPrioridad:
          $ref: '#/components/schemas/NivelPrioridad'

        justificacionPrioridad:
          type: string
          description: Justificación de la prioridad asignada

        solicitanteId:
          type: integer
          format: int64
          description: ID del usuario que realizó la solicitud

        nombreSolicitante:
          type: string
          description: Nombre del solicitante

        responsableAsignadoId:
          type: integer
          format: int64
          description: ID del usuario responsable asignado

        nombreResponsable:
          type: string
          description: Nombre del responsable asignado

    ClasificacionDTO:
      type: object
      properties:
        tipoSolicitud:
          $ref: '#/components/schemas/TipoSolicitud'

    PrioridadSolicitudDTO:
      type: object
      required:
        - prioridad
        - impacto
        - fechaLimite
        - justificacion
      properties:
        prioridad:
          $ref: '#/components/schemas/NivelPrioridad'
        impacto:
          type: string
          description: Impacto académico generado por la solicitud
        fechaLimite:
          type: string
          format: date
          description: Fecha límite para resolver la solicitud
        justificacion:
          type: string
          description: Justificación de la prioridad asignada

    NivelPrioridad:
      type: string
      enum:
        - Baja
        - Media
        - Alta

    CanalOrigen:
      type: string
      enum:
        - CSU
        - Correo electronico
        - SAC

    CambioEstadoDTO:
      type: object
      properties:
        estadoAnterior:
          $ref: '#/components/schemas/EstadoSolicitud'
        estadoNuevo:
          $ref: '#/components/schemas/EstadoSolicitud'

    RegistroHistorialDTO:
      type: object
      properties:
        accionRealizada:
          type: string
        observaciones:
          type: string
        usuarioId:
          type: string

    HistorialSolicitudesRequestDTO:
      type: object
      properties:
        fechaHora:
          type: string
          format: date-time
          description: Fecha y hora en la que se registró la acción
        accionRealizada:
          type: string
          description: Acción ejecutada sobre la solicitud
        observaciones:
          type: string
          description: Comentarios u observaciones asociadas a la acción
        usuarioId:
          type: string
          description: Identificador del usuario responsable de la acción

    HistorialSolicitudesResponseDTO:
      type: object
      properties:
        idHistorial:
          type: integer
          format: int64
          description: Identificador del registro de historial
        fechaHora:
          type: string
          format: date-time
          description: Fecha y hora en que se registró la acción
        accionRealizada:
          type: string
          description: Acción realizada sobre la solicitud
        observaciones:
          type: string
          description: Comentarios asociados a la acción
        idSolicitud:
          type: integer
          format: int64
          description: Identificador de la solicitud
        descripcionSolicitud:
          type: string
          description: Descripción de la solicitud asociada
        idResponsable:
          type: integer
          format: int64
          description: Identificador del usuario responsable

    CierreDTO:
      type: object
      required:
        - observacion
      properties:
        observacion:
          type: string
          description: Observación registrada al cerrar la solicitud

    TipoSolicitud:
      type: string
      enum:
        - RegistroAsignaturas
        - Homologacion
        - CancelacionAsignaturas
        - SolicitudCupos
        - ConsultaAcademica

    EstadoSolicitud:
      type: string
      enum:
        - Registrada
        - Clasificada
        - EnAtencion
        - Atendida
        - Cerrada

    ResumenSolicitudRequestDTO:
      type: object
      properties:
        idSolicitud:
          type: integer
          format: int64
          description: Identificador de la solicitud

        estadoSolicitud:
          $ref: '#/components/schemas/EstadoSolicitud'

        resumenGenerado:
          type: string
          description: Resumen generado automáticamente sobre la solicitud


    PrioridadSolicitudRequestDTO:
      type: object
      properties:
        prioridad:
          $ref: '#/components/schemas/NivelPrioridad'
          description: Nivel de prioridad asignado a la solicitud

        impacto:
          type: string
          description: Impacto académico generado por la solicitud

        justificacion:
          type: string
          description: Justificación de la prioridad asignada

        usarIA:
          type: boolean
          description: Indica si se debe usar inteligencia artificial para apoyar la priorización

    ResumenSolicitudResponseDTO:
      type: object
      properties:
        idSolicitud:
          type: integer
          format: int64
          description: Identificador de la solicitud

        estadoSolicitud:
          $ref: '#/components/schemas/EstadoSolicitud'
          description: Estado actual de la solicitud

        resumenGenerado:
          type: string
          description: Resumen generado automáticamente de la solicitud